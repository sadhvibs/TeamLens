<div class="container">
    <table mat-table [dataSource]="project" class="mat-elevation-z8" style="width: 100%;">

    <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef> Project Title </th>
        <td mat-cell *matCellDef="let project"> {{ project.name }} </td>
    </ng-container>

    <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef> Description </th>
        <td mat-cell *matCellDef="let project"> {{ project.description }} </td>
    </ng-container>

    <ng-container matColumnDef="createdBy">
        <th mat-header-cell *matHeaderCellDef> Created By </th>
        <td mat-cell *matCellDef="let project"> {{ project.createdName | titlecase }} </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
</div>
