<div class="dashboard-container">
  <div class="stats-container">
    <div class="card">
      <h3>Total Tasks</h3>
      <p>{{ totalTasks }}</p>
    </div>

    <div class="card completed">
      <h3>Completed</h3>
      <p>{{ completedTasks }}</p>
    </div>

    <div class="card pending">
      <h3>Pending</h3>
      <p>{{ pendingTasks }}</p>
    </div>

    <div class="card progress">
      <h3>In Progress</h3>
      <p>{{ inProgressTasks }}</p>
    </div>
  </div>
</div>
